<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="js/styles.css">         <!-- Estilos específicos JS/dashboard -->

</head>
<body>
    <!-- CARGA DE SUPABASE CON GARANTÍA -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
    
    <script>
        console.log('🔧 Inicializando Manager...');
        
        // Función para inicializar Supabase de forma segura
        function inicializarSupabase() {
            try {
                // Crear cliente Supabase
                const supabaseClient = supabase.createClient(
                    'https://xbnbbmhcveyzrvvmdktg.supabase.co',
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhibmJibWhjdmV5enJ2dm1ka3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU5NzY1NDgsImV4cCI6MjA4MTU1MjU0OH0.RaNk5B62P97WB93kKJMR1OLac68lDb9JTVthu8_m3Hg'
                );
                console.log('Supabase URL:', supabaseClient.supabaseUrl);
                console.log('Supabase Key existe:', !!supabaseClient.supabaseKey);
                console.log('Cliente creado:', supabaseClient);
                
                window.supabase = supabaseClient;
                console.log('✅ Supabase inicializado correctamente');
                return true;
                
            } catch (error) {
                console.error('❌ Error inicializando Supabase:', error);
                return false;
            }
        }
        
        // Cargar scripts esenciales
        function cargarScriptsEsenciales() {
            const scripts = [
                'js/config.js',
                'js/auth.js',
                'js/fabricacion.js',
                'js/almacen.js', 
                'js/mercado.js',
                'js/presupuesto.js',
                'js/pronosticos.js',
                'js/integracion.js',
                'js/tutorial.js',
                'js/estrategia.js',  // ← MOVERLO AQUÍ (ANTES de main.js)
                'js/main.js',
                'js/usuario.js',
                'js/tabs.js', 
                'js/notificaciones.js', 
                'js/resumenSemanal.js', 
                'js/ingenieria.js'
            ];
            
            let cargados = 0;
            const total = scripts.length;
            
            function cargarSiguiente() {
                if (cargados >= total) {
                    console.log('✅ Todos los scripts esenciales cargados');
                    return;
                }
                
                const script = document.createElement('script');
                script.src = scripts[cargados];
                script.onload = () => {
                    console.log(`📥 Cargado: ${scripts[cargados]}`);
                    cargados++;
                    cargarSiguiente();
                };
                script.onerror = (error) => {
                    console.error(`❌ Error cargando ${scripts[cargados]}:`, error);
                    cargados++;
                    cargarSiguiente();
                };
                
                document.body.appendChild(script);
            }
            
            cargarSiguiente();
        }
        
        // Inicializar cuando todo esté listo
        async function iniciarJuego() {
            console.log('🚀 Iniciando juego...');
            
            // 1. Inicializar Supabase
            if (!inicializarSupabase()) {
                mostrarError('No se pudo conectar con la base de datos');
                return;
            }
            
            // 2. Cargar scripts
            cargarScriptsEsenciales();
            
            // 3. auth.js se encargará del login automáticamente
        }
        
        function mostrarError(mensaje) {
            document.body.innerHTML = `
                <div class="error-screen">
                    <h1><i class="fas fa-exclamation-triangle"></i> Error</h1>
                    <p>${mensaje}</p>
                    <button onclick="location.reload()">Reintentar</button>
                </div>
                <style>
                    .error-screen {
                        min-height: 100vh;
                        background: #15151e;
                        display: flex;
                        flex-direction: column;
                        justify-content: center;
                        align-items: center;
                        color: white;
                        text-align: center;
                        padding: 20px;
                    }
                    .error-screen h1 {
                        color: #e10600;
                        margin-bottom: 20px;
                    }
                    .error-screen button {
                        margin-top: 20px;
                        padding: 10px 30px;
                        background: #e10600;
                        color: white;
                        border: none;
                        border-radius: 5px;
                        cursor: pointer;
                        font-weight: bold;
                    }
                </style>
            `;
        }
        
        // Esperar a que el DOM esté listo
        document.addEventListener('DOMContentLoaded', iniciarJuego);
        
        // Función para ayudar con debugging
        window.ayudaF1 = {
            verificarConexion: async () => {
                if (!window.supabase) {
                    console.log('❌ Supabase no está disponible');
                    return false;
                }
                
                try {
                    const { data, error } = await window.supabase
                        .from('escuderias')
                        .select('count', { count: 'exact', head: true });
                    
                    if (error) {
                        console.log('❌ Error de conexión:', error.message);
                        return false;
                    }
                    
                    console.log('✅ Conexión exitosa a Supabase');
                    return true;
                    
                } catch (error) {
                    console.log('❌ Error verificando conexión:', error);
                    return false;
                }
            },
            
            crearTablasSiFaltan: async () => {
                console.log('🔧 Verificando tablas necesarias...');
                // Esta función ayudaría si faltan tablas, pero necesita permisos de administrador
                console.log('⚠️ Para crear tablas, usa el SQL en el editor de Supabase');
            }
        };
    </script>
</body>
</html>
