<body>

    <!-- REPRODUCTOR DE MÚSICA PERMANENTE (NUNCA SE DESTRUYE) -->

    <!-- CARGA DE SUPABASE CON GARANTÍA -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.7/dist/umd/supabase.min.js"></script>
    
    <script>
        console.log('🔧 Inicializando Critical Lap...');
        
        // Función para trackear eventos con Google Analytics
        function trackEvent(category, action, label = null, value = null) {
            try {
                // Google Analytics 4
                if (typeof gtag === 'function') {
                    gtag('event', action, {
                        'event_category': category,
                        'event_label': label,
                        'value': value
                    });
                }
                
                console.log(`📊 Event tracked: ${category} - ${action}`);
            } catch (e) {
                console.log('Error tracking event:', e);
            }
        }
        
        // Función para inicializar Supabase de forma segura
        function inicializarSupabase() {
            try {
                // Crear cliente Supabase
                const supabaseClient = supabase.createClient(
                    'https://xbnbbmhcveyzrvvmdktg.supabase.co',
                    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhibmJibWhjdmV5enJ2dm1ka3RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU5NzY1NDgsImV4cCI6MjA4MTU1MjU0OH0.RaNk5B62P97WB93kKJMR1OLac68lDb9JTVthu8_m3Hg'
                );
                
                window.supabase = supabaseClient;
                console.log('✅ Supabase inicializado correctamente');
                
                // Trackear éxito de conexión
                trackEvent('system', 'supabase_connected', 'success');
                
                return true;
                
            } catch (error) {
                console.error('❌ Error inicializando Supabase:', error);
                trackEvent('system', 'supabase_error', error.message);
                return false;
            }
        }
        
        // Cargar scripts esenciales
        function cargarScriptsEsenciales() {
            const scripts = [
                'js/config.js',
                'js/auth.js',
                'js/fabricacion.js',
                'js/almacen.js', 
                'js/mercado.js',
                'js/presupuesto.js',
                'js/pronosticos.js',
                'js/integracion.js',
                'js/tutorial.js',
                'js/estrategia.js',
                'js/main.js',
                'js/usuario.js',
                'js/tabs.js', 
                'js/notificaciones.js', 
                'js/resumenSemanal.js', 
                'js/ingenieria.js'
            ];
            
            let cargados = 0;
            const total = scripts.length;
            
            function cargarSiguiente() {
                if (cargados >= total) {
                    console.log('✅ Todos los scripts esenciales cargados');
                    trackEvent('system', 'all_scripts_loaded', 'success', total);
                    return;
                }
                
                const script = document.createElement('script');
                script.src = scripts[cargados];
                script.onload = () => {
                    console.log(`📥 Cargado: ${scripts[cargados]}`);
                    cargados++;
                    cargarSiguiente();
                };
                script.onerror = (error) => {
                    console.error(`❌ Error cargando ${scripts[cargados]}:`, error);
                    trackEvent('system', 'script_error', scripts[cargados]);
                    cargados++;
                    cargarSiguiente();
                };
                
                document.body.appendChild(script);
            }
            
            // Trackear inicio de carga
            trackEvent('system', 'scripts_loading_start', 'total_scripts', total);
            cargarSiguiente();
        }
        
        // Inicializar cuando todo esté listo
        async function iniciarJuego() {
            console.log('🚀 Iniciando Critical Lap...');
            
            // Trackear inicio
            trackEvent('game', 'game_start', 'initialization');
            
            // 1. Inicializar Supabase
            if (!inicializarSupabase()) {
                mostrarError('No se pudo conectar con la base de datos');
                trackEvent('error', 'connection_failed', 'supabase');
                return;
            }
            
            // 2. Cargar scripts
            cargarScriptsEsenciales();
            
            // 3. Trackear tiempo de carga completo
            window.addEventListener('load', function() {
                const loadTime = performance.now();
                trackEvent('performance', 'full_load_time', 'ms', Math.round(loadTime));
            });
        }
        
        function mostrarError(mensaje) {
            document.body.innerHTML = `
                <div class="error-screen">
                    <h1><i class="fas fa-exclamation-triangle"></i> Error en Critical Lap</h1>
                    <p>${mensaje}</p>
                    <p style="font-size: 14px; opacity: 0.7;">Por favor, intenta recargar la página</p>
                    <button onclick="location.reload()">Reintentar</button>
                </div>
                <style>
                    .error-screen {
                        min-height: 100vh;
                        background: #15151e;
                        display: flex;
                        flex-direction: column;
                        justify-content: center;
                        align-items: center;
                        color: white;
                        text-align: center;
                        padding: 20px;
                        font-family: 'Orbitron', sans-serif;
                    }
                    .error-screen h1 {
                        color: #e10600;
                        margin-bottom: 20px;
                        font-weight: 700;
                        text-transform: uppercase;
                        letter-spacing: 2px;
                    }
                    .error-screen button {
                        margin-top: 20px;
                        padding: 12px 40px;
                        background: #e10600;
                        color: white;
                        border: none;
                        border-radius: 5px;
                        cursor: pointer;
                        font-weight: bold;
                        font-family: 'Orbitron', sans-serif;
                        text-transform: uppercase;
                        letter-spacing: 1px;
                        transition: all 0.3s;
                    }
                    .error-screen button:hover {
                        background: #ff1e00;
                        transform: scale(1.05);
                    }
                </style>
            `;
            
            trackEvent('error', 'fatal_error', mensaje);
        }
        
        // Esperar a que el DOM esté listo
        document.addEventListener('DOMContentLoaded', iniciarJuego);
        
        // Función para ayudar con debugging y analytics
        window.CriticalLap = {
            trackEvent: trackEvent,
            
            verificarConexion: async () => {
                if (!window.supabase) {
                    console.log('❌ Supabase no está disponible');
                    trackEvent('debug', 'supabase_not_available');
                    return false;
                }
                
                try {
                    const { data, error } = await window.supabase
                        .from('escuderias')
                        .select('count', { count: 'exact', head: true });
                    
                    if (error) {
                        console.log('❌ Error de conexión:', error.message);
                        trackEvent('debug', 'connection_error', error.message);
                        return false;
                    }
                    
                    console.log('✅ Conexión exitosa a Supabase');
                    trackEvent('debug', 'connection_success');
                    return true;
                    
                } catch (error) {
                    console.log('❌ Error verificando conexión:', error);
                    trackEvent('debug', 'verification_error', error.message);
                    return false;
                }
            },
            
            // Función para trackear progreso del jugador
            trackPlayerProgress: (action, details) => {
                trackEvent('player', action, details);
            },
            
            // Función para trackear errores específicos del juego
            trackGameError: (errorType, errorMessage) => {
                trackEvent('game_error', errorType, errorMessage);
            }
        };
        
        // Registrar tiempo de inicio para métricas de rendimiento
        window.performanceStart = Date.now();
    </script>
